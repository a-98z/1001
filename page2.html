<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الجمعيات الخيرية المتعاونة - صفحة 2</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2a9d8f;
            --secondary-color: #264653;
            --accent-color: #e9c46a;
            --light-color: #f8f9fa;
            --dark-color: #343a40;
            --success-color: #28a745;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.1);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background-color: #f5f7fa; color: var(--dark-color); line-height: 1.6; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        
        header { background: linear-gradient(135deg, var(--secondary-color) 0%, var(--primary-color) 100%); color: white; padding: 1.5rem 0; box-shadow: var(--shadow); position: sticky; top: 0; z-index: 100; }
        .header-content { display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 10px; }
        .logo i { font-size: 2rem; color: var(--accent-color); }
        .logo h1 { font-size: 1.8rem; font-weight: 700; }
        .logo span { color: var(--accent-color); }

        .top-nav { display: flex; gap: 15px; }
        .nav-link { color: white; text-decoration: none; padding: 8px 16px; border-radius: 6px; font-weight: 600; transition: all 0.3s ease; background-color: rgba(255, 255, 255, 0.1); }
        .nav-link:hover, .nav-link.active { background-color: var(--accent-color); color: var(--secondary-color); }
        
        .associations-container { margin: 2rem 0; }
        .section-title { color: var(--secondary-color); text-align: center; margin-bottom: 2rem; font-size: 1.8rem; position: relative; padding-bottom: 10px; }
        .section-title:after { content: ''; position: absolute; bottom: 0; right: 50%; transform: translateX(50%); width: 80px; height: 4px; background-color: var(--primary-color); border-radius: 2px; }
        
        .associations-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 1.5rem; }
        .association-card { background-color: white; border-radius: 12px; overflow: hidden; box-shadow: var(--shadow); transition: all 0.3s ease; }
        .association-card:hover { box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15); }
        
        .card-header { background: linear-gradient(to right, var(--primary-color), var(--secondary-color)); color: white; padding: 1.2rem; display: flex; justify-content: space-between; align-items: center; }
        .association-name { font-weight: 600; font-size: 1.2rem; flex: 1; }
        
        .copy-all-icon { background-color: transparent; color: white; border: none; font-size: 1.2rem; cursor: pointer; padding: 5px; border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; transition: all 0.3s ease; }
        .copy-all-icon:hover { background-color: rgba(255, 255, 255, 0.2); transform: scale(1.1); }
        
        .card-body { padding: 1.5rem; }
        .contact-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.2rem; padding-bottom: 1.2rem; border-bottom: 1px solid #eee; }
        .phone-number { font-size: 1.3rem; font-weight: 700; color: var(--secondary-color); }
        
        .action-buttons { display: flex; gap: 10px; }
        .btn { padding: 8px 15px; border-radius: 6px; border: none; cursor: pointer; font-family: 'Cairo', sans-serif; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: all 0.3s ease; text-decoration: none; }
        .btn-copy { background-color: #e7f5ff; color: var(--primary-color); }
        .btn-copy:hover { background-color: #d0ebff; }
        .btn-call { background-color: var(--success-color); color: white; }
        .btn-call:hover { background-color: #218838; }
        .card-footer { background-color: #f8f9fa; padding: 1rem 1.5rem; font-size: 0.95rem; color: #666; line-height: 1.5; }

        .pagination-container { display: flex; justify-content: center; align-items: center; gap: 20px; margin: 3rem 0; }
        .btn-nav-page { padding: 10px 25px; background-color: var(--secondary-color); color: white; border-radius: 8px; font-size: 1.1rem; text-decoration: none; font-weight: 600; box-shadow: var(--shadow); }
        .btn-nav-page:hover { background-color: var(--primary-color); }
        
        footer { background-color: var(--secondary-color); color: white; padding: 2rem 0; text-align: center; margin-top: 3rem; }
        
        .toast { position: fixed; bottom: 30px; right: 30px; background-color: var(--success-color); color: white; padding: 15px 25px; border-radius: 8px; box-shadow: var(--shadow); display: flex; align-items: center; gap: 10px; z-index: 1000; transform: translateY(100px); opacity: 0; transition: all 0.3s ease; }
        .toast.show { transform: translateY(0); opacity: 1; }
        
        @media (max-width: 768px) { .header-content { flex-direction: column; text-align: center; gap: 15px; } .associations-grid { grid-template-columns: 1fr; } .top-nav { width: 100%; justify-content: center; } }
    </style>
</head>
<body>
    <header>
        <div class="container header-content">
            <div class="logo">
                <i class="fas fa-hands-helping"></i>
                <h1>خدمة <span>توصيل الأثاث</span> الخيري</h1>
            </div>
            <nav class="top-nav">
                <a href="index.html" class="nav-link">الرئيسية</a>
                <a href="page2.html" class="nav-link active">الجمعيات </a>
                <a href="page3.html" class="nav-link">اعمالنا</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="associations-container">
            <h2 class="section-title">الجمعيات الخيرية المتعاونة (20 جمعية)</h2>
            <div class="associations-grid" id="associationsContainer">
                </div>
        </section>

        <div class="pagination-container">
            <a href="index.html" class="btn btn-nav-page"><i class="fas fa-arrow-right"></i> السابق (الرئيسية)</a>
            <a href="page3.html" class="btn btn-nav-page">التالي (صفحة 3) <i class="fas fa-arrow-left"></i></a>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>© 2026 خدمة توصيل الأثاث الخيري بالرياض. جميع الحقوق محفوظة.</p>
        </div>
    </footer>

    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMessage">تم النسخ بنجاح!</span>
    </div>

    <script>
        const associations = [
            { name: "توصيل أثاث جمعية خيرية بالرياض", phone: "0559836277", description: "تأخذ أثاث مستعمل بالرياض - نوفر خدمة توصيل الأثاث المستعمل بالرياض إلى الجمعيات الخيرية بكل سهولة 🚚" },
            { name: "خدمة نقل الأثاث للجمعيات الخيرية", phone: "0559836277", description: "عندك أثاث وتبغى توصله لجمعية خيرية؟ نحن نوصله عنك داخل الرياض 🤍" },
            { name: "توصيل الأثاث المستعمل بالرياض", phone: "0559836277", description: "خدمة نقل وتوصيل الأثاث للجمعيات الخيرية بالرياض - سريع وآمن" },
            { name: "نقل وتوصيل الأثاث الخيري", phone: "0559836277", description: "وفر وقتك وجهدك 🙏 نقوم بتوصيل الأثاث نيابة عنك للجمعيات الخيرية" },
            { name: "خدمة توصيل الأثاث للجمعيات", phone: "0559836277", description: "توصيل الأثاث المستعمل إلى الجمعيات الخيرية داخل الرياض - اتصل الآن" },
            { name: "أثاثك صدقة... ونحن نوصله", phone: "0559836277", description: "نساعدك في إيصال تبرعك للأسر المحتاجة - خدمة توصيل أثاث بالرياض" },
            { name: "نقل وتوصيل الأثاث المستعمل للجمعيات الخيرية", phone: "0559836277", description: "باحترافية عالية داخل مدينة الرياض" },
            { name: "خدمة توصيل الأثاث الخيري بالرياض", phone: "0559836277", description: "راحة لك وأجر لك - نوصل تبرعاتك للجمعيات" },
            { name: "توصيل الكنب والغرف للجمعيات", phone: "0559836277", description: "عندك كنب أو غرفة نوم وتبغى توصلها؟ نستلم ونوصل للجمعيات الخيرية" },
            { name: "توصيل الأثاث لجميع أحياء الرياض", phone: "0559836277", description: "نغطي جميع أحياء الرياض - توصيل الأثاث للجمعيات الخيرية" },
            { name: "نقل أثاث خيري داخل الرياض", phone: "0559836277", description: "خل تبرعك يوصل بأمان - خدمة موثوقة لنقل الأثاث" },
            { name: "خدمة موثوقة لتوصيل الأثاث", phone: "0559836277", description: "نرتب وننقل الأثاث للجمعيات الخيرية - خدمة موثوقة واحترافية" },
            { name: "لا تشيل هم النقل 🚚", phone: "0559836277", description: "نقوم بتوصيل الأثاث للجمعيات الخيرية بالرياض - وفر جهدك ووقتك" },
            { name: "خدمة توصيل أثاث خيري بأسعار مناسبة", phone: "0559836277", description: "الرياض - أسعار تنافسية لخدمات النقل والتوصيل" },
            { name: "نوصلك بالخير 🌱", phone: "0559836277", description: "توصيل الأثاث المستعمل للجمعيات - نساعدك في إيصال الخير" },
            { name: "من بيتك للجمعية مباشرة", phone: "0559836277", description: "خدمة توصيل أثاث بالرياض - نأخذ من منزلك ونوصل للجمعية" },
            { name: "أثاثك يوصل لمستحقيه بإذن الله", phone: "0559836277", description: "نقل خيري بالرياض - ضمان وصول تبرعاتك للمستحقين" },
            { name: "خدمة سريعة وملتزمة", phone: "0559836277", description: "توصيل الأثاث للجمعيات الخيرية - التزام بالمواعيد والجودة" },
            { name: "تبرعك علينا توصيله", phone: "0559836277", description: "اتصل الآن - نحن نتولى عملية النقل والتوصيل بالكامل" },
            { name: "خدمة شاملة للتوصيل الخيري", phone: "0559836277", description: "جميع أنواع الأثاث - جميع مناطق الرياض - خدمة متكاملة" }
        ];

        const associationsContainer = document.getElementById('associationsContainer');
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toastMessage');

        function showToast(message) {
            toastMessage.textContent = message;
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 3000);
        }

        function copyToClipboard(text, message) {
            navigator.clipboard.writeText(text)
                .then(() => { showToast(message); })
                .catch(err => { showToast('فشل النسخ، حاول مرة أخرى'); });
        }

        function createAssociationCard(association, index) {
            const card = document.createElement('div');
            card.className = 'association-card';
            card.innerHTML = `
                <div class="card-header">
                    <div class="association-name">${association.name}</div>
                    <button class="copy-all-icon" data-index="${index}" title="نسخ معلومات الجمعية">
                        <i class="far fa-copy"></i>
                    </button>
                </div>
                <div class="card-body">
                    <div class="contact-info">
                        <div class="phone-number">${association.phone}</div>
                        <div class="action-buttons">
                            <button class="btn btn-copy copy-phone-btn" data-phone="${association.phone}">
                                <i class="far fa-copy"></i>
                                نسخ الرقم
                            </button>
                            <a href="tel:${association.phone}" class="btn btn-call">
                                <i class="fas fa-phone-alt"></i>
                                اتصل الآن
                            </a>
                        </div>
                    </div>
                </div>
                <div class="card-footer">
                    ${association.description}
                </div>
            `;
            return card;
        }

        function handleCopyAll(index) {
            const association = associations[index];
            const textToCopy = `اسم الجمعية: ${association.name}\nرقم الجوال: ${association.phone}\n${association.description}`;
            copyToClipboard(textToCopy, 'تم نسخ معلومات الجمعية بنجاح!');
        }

        function init() {
            associations.forEach((association, index) => {
                const card = createAssociationCard(association, index);
                associationsContainer.appendChild(card);
            });
            
            document.querySelectorAll('.copy-all-icon').forEach(button => {
                button.addEventListener('click', (e) => {
                    handleCopyAll(e.currentTarget.getAttribute('data-index'));
                });
            });
            
            document.querySelectorAll('.copy-phone-btn').forEach(button => {
                button.addEventListener('click', (e) => {
                    copyToClipboard(e.currentTarget.getAttribute('data-phone'), 'تم نسخ رقم الجوال بنجاح!');
                });
            });
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
